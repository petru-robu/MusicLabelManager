services:
  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    depends_on:
      - php

  php:
    ports:
      - "8080:80"   # Expose PHP backend to host for local dev

volumes:
  frontend_node_modules:
