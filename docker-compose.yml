version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: laravel_app
    expose:
      - "8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://petrucodes.ro

  frontend:
    build:
      context: ./frontend
    container_name: react_app
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
    working_dir: /app

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
