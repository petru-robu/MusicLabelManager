version: "3.9"

services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: php
    volumes:
      - ./backend/src:/var/www/html
    ports:
      - "8080:80"   # expose for local dev

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
